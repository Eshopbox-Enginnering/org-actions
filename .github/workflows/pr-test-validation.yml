name: Validate PR Test Coverage

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches:
      - "feature/**"
      - "Feature/**"
      - "FEATURE/**"
      - "staging"
      - "main"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-tests:
    if: ${{ github.head_ref != 'conflict/remove-text-recharge-to-avoid' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR head commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Determine repository type and bypass
        id: repo_check
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          echo "Repository: $REPO"

          BYPASS_LIST=(
            "Eshopbox-Enginnering/poe-frontend"
            "Eshopbox-Enginnering/amzWholesale-Warehouse-Portal-Frontend"
            "Eshopbox-Enginnering/eshopbox-wms-api"
            "Eshopbox-Enginnering/clickpost-microservice"
            "Eshopbox-Enginnering/eshopbox-wms-middleware"
            "Eshopbox-Enginnering/unicommerce-microservice"
            "Eshopbox-Enginnering/unicommerce-inventory-microservice"
            "Eshopbox-Enginnering/eshopbox-wms-backend"
            "Eshopbox-Enginnering/myntra-microservices"
            "Eshopbox-Enginnering/scan-label"
            "Eshopbox-Enginnering/eshopbox-client-services"
            "Eshopbox-Enginnering/org-actions"
          )

          if printf '%s\n' "${BYPASS_LIST[@]}" | grep -q "^$REPO$"; then
            echo "bypass=true" >> "$GITHUB_OUTPUT"
            echo "✅ Repo is bypassed."
          elif [ "$REPO" = "Eshopbox-Enginnering/eshopbox-client-portal-frontend" ]; then
            echo "type=angular" >> "$GITHUB_OUTPUT"
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          else
            echo "type=java" >> "$GITHUB_OUTPUT"
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect revert PR/commit
        id: revert_check
        shell: bash
        run: |
          set -euo pipefail

          TITLE="$(jq -r '.pull_request.title // ""' "$GITHUB_EVENT_PATH")"
          BODY="$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")"

          echo "PR title: $TITLE"

          is_revert="false"

          if echo "$TITLE" | grep -Eiq '^\s*revert\b'; then
            is_revert="true"
          elif echo "$BODY" | grep -Eiq 'this reverts commit'; then
            is_revert="true"
          fi

          echo "is_revert=$is_revert" >> "$GITHUB_OUTPUT"

      - name: Revert PR — skip validation
        if: steps.revert_check.outputs.is_revert == 'true'
        shell: bash
        run: echo "✅ Revert PR/commit detected. Validation skipped."

      - name: Skip validation for bypassed repos
        if: steps.repo_check.outputs.bypass == 'true'
        shell: bash
        run: echo "✅ Skipping validation for bypassed repo."

      - name: Get PR changed files from GitHub API
        id: pr_files
        if: steps.repo_check.outputs.bypass != 'true' && steps.revert_check.outputs.is_revert != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --paginate \
            --jq '.[].filename' > changed_files.txt

          echo "🔍 Changed files from GitHub PR API:"
          cat changed_files.txt || true

          if [ ! -s changed_files.txt ]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No changes — skip validation
        if: steps.revert_check.outputs.is_revert != 'true' && steps.pr_files.outputs.no_changes == 'true'
        shell: bash
        run: |
          echo "✅ No relevant changes. Skipping validation."
          exit 0

      ####################################
      # Angular validation
      ####################################
      - name: Validate Angular test changes
        id: angular_check
        if: steps.repo_check.outputs.type == 'angular' && steps.repo_check.outputs.bypass != 'true' && steps.revert_check.outputs.is_revert != 'true' && steps.pr_files.outputs.no_changes != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          echo "🔍 Changed files:"
          cat changed_files.txt || true

          FILES=$(grep -E '^src/|^libs/|^apps/' changed_files.txt | grep -E '\.(component|service|pipe|directive)\.ts$' | grep -v '\.spec\.ts$' || true)

          if [ -z "${FILES:-}" ]; then
            echo "✅ No Angular logic .ts files changed."
            exit 0
          fi

          echo "🧩 Files requiring .spec.ts:"
          printf '%s\n' "$FILES"

          MISSING=0
          MISSING_LIST=""

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            dir="$(dirname "$f")"
            base="$(basename "$f" .ts)"
            test_file="$dir/${base}.spec.ts"

            if grep -qFx "$test_file" changed_files.txt; then
              echo "✅ Found test for $f"
            else
              echo "❌ Missing test for $f (expected $test_file in PR)"
              MISSING=$((MISSING+1))
              MISSING_LIST="${MISSING_LIST}\n- $f → $test_file"
            fi
          done <<< "$FILES"

          {
            echo "missing_count=$MISSING"
            echo "missing_list<<EOF"
            printf '%b\n' "$MISSING_LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$MISSING" -gt 0 ]; then
            echo "Angular test validation failed: $MISSING missing"
            exit 1
          else
            echo "✅ All modified Angular logic files have tests."
          fi

      - name: Comment on PR — Angular missing tests
        if: always() && steps.revert_check.outputs.is_revert != 'true' && steps.pr_files.outputs.no_changes != 'true' && steps.angular_check.outcome == 'failure'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ⚠️ **Test file missing in PR**

            The following Angular logic files were changed without corresponding `.spec.ts` updates:

            ${{ steps.angular_check.outputs.missing_list }}

      - name: Fail workflow if Angular validation failed
        if: steps.revert_check.outputs.is_revert != 'true' && steps.pr_files.outputs.no_changes != 'true' && steps.angular_check.outcome == 'failure'
        shell: bash
        run: |
          echo "❌ Failing because Angular test validation failed."
          exit 1

      ####################################
      # Java validation
      ####################################
      - name: Validate Java test changes
        id: java_check
        if: steps.repo_check.outputs.type == 'java' && steps.repo_check.outputs.bypass != 'true' && steps.revert_check.outputs.is_revert != 'true' && steps.pr_files.outputs.no_changes != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          echo "🔍 Changed files:"
          cat changed_files.txt || true

          FILES=$(grep -E '^src/main/java/.*/(dao|service|endpoint|controller)/.*\.java$' changed_files.txt | grep -v -E '(Test|Tests|IT)\.java$' || true)

          if [ -z "${FILES:-}" ]; then
            echo "✅ No relevant Java files changed."
            exit 0
          fi

          echo "🧩 Files requiring test validation:"
          printf '%s\n' "$FILES"

          MISSING=0
          MISSING_LIST=""

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            rel_path="$(echo "$f" | sed 's|^src/main/java/||')"
            t1="src/test/java/${rel_path%.java}Test.java"
            t2="src/test/java/${rel_path%.java}Tests.java"
            t3="src/test/java/${rel_path%.java}IT.java"

            if grep -qFx "$t1" changed_files.txt || grep -qFx "$t2" changed_files.txt || grep -qFx "$t3" changed_files.txt; then
              echo "✅ Found test for $f"
            else
              echo "❌ Missing test for $f"
              MISSING=$((MISSING+1))
              MISSING_LIST="${MISSING_LIST}\n- $f"
            fi
          done <<< "$FILES"

          {
            echo "missing_count=$MISSING"
            echo "missing_list<<EOF"
            printf '%b\n' "$MISSING_LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$MISSING" -gt 0 ]; then
            echo "Java test validation failed: $MISSING missing"
            exit 1
          else
            echo "✅ All modified Java files have tests."
          fi

      - name: Comment on PR — Java missing tests
        if: always() && steps.revert_check.outputs.is_revert != 'true' && steps.pr_files.outputs.no_changes != 'true' && steps.java_check.outcome == 'failure'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ⚠️ **Test file missing in PR**

            The following Java files were changed without corresponding test updates:

            ${{ steps.java_check.outputs.missing_list }}

      - name: Fail workflow if Java validation failed
        if: steps.revert_check.outputs.is_revert != 'true' && steps.pr_files.outputs.no_changes != 'true' && steps.java_check.outcome == 'failure'
        shell: bash
        run: |
          echo "❌ Failing because Java test validation failed."
          exit 1
