name: Validate PR Title and Ticket

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]
    branches:
      - "staging"
      - "main"

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  validate-pr-title-and-ticket:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate PR title, description, and commit messages
        id: validate
        uses: actions/github-script@v7
        env:
          CENTRAL_BACKLOG_READ_TOKEN: ${{ secrets.CENTRAL_BACKLOG_READ_TOKEN }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const rawTitle = pr.title || "";
            const rawBody = pr.body || "";

            const title = rawTitle.trim();
            const body = rawBody.trim();

            core.info(`Latest PR title: ${title}`);
            core.info(`Latest PR body: ${body}`);

            // Supports:
            // Feature to Staging: Summary
            // Feature to Staging : Summary
            // Feature to Staging | Summary
            const titleRegex = /^(feature|features|bug|bugs|patch|patches|conflict|conflicts)\s+to\s+(staging|main)\s*(?::|\|)\s*.+$/i;
            const closingRegex = /\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\b/i;

            const shortRefRegex = /Eshopbox-Enginnering\/Central-Backlog#(\d+)/i;
            const urlRefRegex = /https:\/\/github\.com\/Eshopbox-Enginnering\/Central-Backlog\/issues\/(\d+)/i;

            const commitGoodPattern = /^([A-Z]+-\d+):\s+(add|fix|update|refactor|remove|improve)\b.+/i;
            const commitBadPattern = /^(changes|change|fix|fixes|update|updates|common|common changes|minor|minor changes)$/i;

            const titleGuidance = [
              "Invalid PR title format.",
              "",
              "Use one of these formats:",
              "  <type> to Staging: <summary>",
              "  <type> to Main: <summary>",
              "  <type> to Staging | <summary>",
              "  <type> to Main | <summary>",
              "",
              "Allowed types:",
              "  Feature, Features, Bug, Bugs, Patch, Patches, Conflict, Conflicts",
              "",
              "Examples:",
              "  Feature to Staging: Order detail bugfix",
              "  Feature to Staging : Order detail bugfix",
              "  Feature to Staging | Order detail bugfix",
              "  Features to Main: Bulk order and invoice improvements",
              "  Bug to Staging | Fix payment sync issue",
              "  Bugs to Main : Resolve pickup and manifest issues",
              "  Patch to Staging: Update order API handling",
              "  Conflicts to Main | Resolve staging merge conflicts"
            ].join("\n");

            const descriptionGuidance = [
              "PR description must include a valid Central Backlog issue reference.",
              "",
              "Accepted examples:",
              "  Eshopbox-Enginnering/Central-Backlog#2516",
              "  https://github.com/Eshopbox-Enginnering/Central-Backlog/issues/2516"
            ].join("\n");

            const closingKeywordGuidance = [
              "Do not use Closes, Fixes, or Resolves in PR description.",
              "",
              "Use only a backlog reference like:",
              "  Eshopbox-Enginnering/Central-Backlog#2516",
              "  https://github.com/Eshopbox-Enginnering/Central-Backlog/issues/2516"
            ].join("\n");

            const titleErrors = [];
            const descriptionErrors = [];
            const warnings = [];

            let issueNumber = null;

            if (!titleRegex.test(title)) {
              titleErrors.push(titleGuidance);
            }

            if (body.length === 0) {
              descriptionErrors.push(descriptionGuidance);
            } else {
              if (closingRegex.test(body)) {
                descriptionErrors.push(closingKeywordGuidance);
              }

              const shortMatch = body.match(shortRefRegex);
              const urlMatch = body.match(urlRefRegex);

              if (!shortMatch && !urlMatch) {
                descriptionErrors.push(descriptionGuidance);
              } else {
                issueNumber = Number((shortMatch && shortMatch[1]) || (urlMatch && urlMatch[1]));

                if (!issueNumber || Number.isNaN(issueNumber)) {
                  descriptionErrors.push(descriptionGuidance);
                } else {
                  try {
                    const token = process.env.CENTRAL_BACKLOG_READ_TOKEN;

                    if (!token) {
                      throw new Error("Missing secret CENTRAL_BACKLOG_READ_TOKEN");
                    }

                    const backlogResponse = await fetch(
                      `https://api.github.com/repos/Eshopbox-Enginnering/Central-Backlog/issues/${issueNumber}`,
                      {
                        headers: {
                          "Authorization": `Bearer ${token}`,
                          "Accept": "application/vnd.github+json",
                          "X-GitHub-Api-Version": "2022-11-28"
                        }
                      }
                    );

                    if (!backlogResponse.ok) {
                      const errorText = await backlogResponse.text();
                      throw new Error(`GitHub API response: ${backlogResponse.status} ${errorText}`);
                    }

                    core.info(`Central Backlog issue #${issueNumber} is accessible`);
                  } catch (error) {
                    descriptionErrors.push([
                      `Central Backlog issue not found or not accessible: #${issueNumber}`,
                      "",
                      `${error.message}`,
                      "",
                      "Use a valid issue reference in PR description, for example:",
                      `  Eshopbox-Enginnering/Central-Backlog#${issueNumber}`,
                      `  https://github.com/Eshopbox-Enginnering/Central-Backlog/issues/${issueNumber}`
                    ].join("\n"));
                  }
                }
              }
            }

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100
              }
            );

            const invalidCommitMessages = [];

            for (const commit of commits) {
              const firstLine = (commit.commit.message || "").split("\n")[0].trim();
              const isBadGeneric = commitBadPattern.test(firstLine);
              const isGoodFormat = commitGoodPattern.test(firstLine);

              if (isBadGeneric || !isGoodFormat) {
                invalidCommitMessages.push(firstLine || "(empty commit message)");
              }
            }

            if (invalidCommitMessages.length > 0) {
              warnings.push([
                "Commit message best-practice warning:",
                "",
                "Some commit messages are not in recommended format.",
                "",
                "Recommended format:",
                "  CB-2516: Fix order detail API null handling",
                "  CB-2480: Add payment validation",
                "  CB-2601: Refactor shipment retry flow",
                "",
                "Avoid vague commit messages like:",
                "  changes",
                "  fixes",
                "  updates",
                "  common changes",
                "  minor changes",
                "",
                "Commits found:",
                ...invalidCommitMessages.map(m => `  - ${m}`)
              ].join("\n"));
            }

            const hasBlockingErrors = titleErrors.length > 0 || descriptionErrors.length > 0;
            const summaryLines = [];

            if (!hasBlockingErrors) {
              summaryLines.push("PR title and description validation passed.");
              if (issueNumber) {
                summaryLines.push(`Linked issue: Eshopbox-Enginnering/Central-Backlog#${issueNumber}`);
              }
            } else {
              summaryLines.push("PR validation failed.");

              if (titleErrors.length > 0) {
                summaryLines.push("");
                summaryLines.push("Title issues:");
                summaryLines.push(...titleErrors);
              }

              if (descriptionErrors.length > 0) {
                summaryLines.push("");
                summaryLines.push("Description issues:");
                summaryLines.push(...descriptionErrors);
              }
            }

            if (warnings.length > 0) {
              summaryLines.push("");
              summaryLines.push("Warnings:");
              summaryLines.push(...warnings);
            }

            core.setOutput("summary", summaryLines.join("\n\n"));
            core.setOutput("warnings_present", warnings.length > 0 ? "true" : "false");
            core.setOutput("blocking_errors_present", hasBlockingErrors ? "true" : "false");
            core.setOutput("pr_author", pr.user.login);

            if (hasBlockingErrors) {
              const failLines = ["PR validation failed."];

              if (titleErrors.length > 0) {
                failLines.push("");
                failLines.push("Title issues:");
                failLines.push(...titleErrors);
              }

              if (descriptionErrors.length > 0) {
                failLines.push("");
                failLines.push("Description issues:");
                failLines.push(...descriptionErrors);
              }

              core.setFailed(failLines.join("\n\n"));
              return;
            }

            core.info(summaryLines.join("\n\n"));

      - name: Add or update PR comment with validation result
        if: always()
        uses: actions/github-script@v7
        env:
          VALIDATION_SUMMARY: ${{ steps.validate.outputs.summary }}
          BLOCKING_ERRORS_PRESENT: ${{ steps.validate.outputs.blocking_errors_present }}
          WARNINGS_PRESENT: ${{ steps.validate.outputs.warnings_present }}
          PR_AUTHOR: ${{ steps.validate.outputs.pr_author }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const summary = process.env.VALIDATION_SUMMARY || "Validation completed.";
            const hasBlocking = process.env.BLOCKING_ERRORS_PRESENT === "true";
            const hasWarnings = process.env.WARNINGS_PRESENT === "true";
            const prAuthor = process.env.PR_AUTHOR || pr.user.login;

            const marker = "<!-- pr-title-ticket-validation-comment -->";

            let header = "## PR validation result";
            if (hasBlocking) {
              header = "## PR validation failed";
            } else if (hasWarnings) {
              header = "## PR validation passed with warnings";
            } else {
              header = "## PR validation passed";
            }

            const mentionLine = hasBlocking
              ? `@${prAuthor} please update this PR based on the validation details below.`
              : hasWarnings
              ? `@${prAuthor} PR validation passed, but please review the warning(s) below.`
              : `@${prAuthor} PR validation passed successfully.`;

            const commentBody = [
              marker,
              header,
              "",
              mentionLine,
              "",
              "```text",
              summary,
              "```"
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100
            });

            const existing = comments.find(comment =>
              comment.user.type === "Bot" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: commentBody
              });
            }
