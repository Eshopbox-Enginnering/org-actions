name: Validate PR Title and Ticket

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]
    branches:
      # - "staging"
      - "main"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr-title-and-ticket:
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Validate PR title and description
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const rawTitle = pr.title || "";
            const rawBody = pr.body || "";

            const title = rawTitle.trim();
            const body = rawBody.trim();

            const sourceBranch = pr.head.ref || "";
            const targetBranch = pr.base.ref || "";

            core.info(`Latest PR title: ${title}`);
            core.info(`Latest PR body: ${body}`);
            core.info(`Source branch: ${sourceBranch}`);
            core.info(`Target branch: ${targetBranch}`);

            const allowedTypes = [
              "feature",
              "features",
              "bug",
              "bugs",
              "patch",
              "patches",
              "conflict",
              "conflicts"
            ];

            const normalizeType = value => {
              const lower = String(value || "").toLowerCase();
              if (lower === "features") return "feature";
              if (lower === "bugs") return "bug";
              if (lower === "patches") return "patch";
              if (lower === "conflicts") return "conflict";
              return lower;
            };

            const getBranchType = branchName => {
              const firstPart = String(branchName || "").split(/[\/_-]/)[0];
              const normalized = normalizeType(firstPart);
              return ["feature", "bug", "patch", "conflict"].includes(normalized)
                ? normalized
                : null;
            };

            // Supports:
            // Feature to Staging: Summary
            // Feature to Staging : Summary
            // Feature to Staging | Summary
            const titleRegex = /^(feature|features|bug|bugs|patch|patches|conflict|conflicts)\s+to\s+(staging|main)\s*(?::|\|)\s*(.+)$/i;

            const shortRefRegex = /Eshopbox-Enginnering\/Central-Backlog#(\d+)/i;
            const urlRefRegex = /https:\/\/github\.com\/Eshopbox-Enginnering\/Central-Backlog\/issues\/(\d+)/i;

            const titleGuidance = [
              "Invalid PR title format.",
              "",
              "Use one of these formats:",
              "  <source> to <target>: <summary>",
              "  <source> to <target> | <summary>",
              "",
              "Allowed sources:",
              "  Feature, Features, Bug, Bugs, Patch, Patches, Conflict, Conflicts",
              "",
              "Allowed targets:",
              "  Staging, Main",
              "",
              "Examples:",
              "  Bug to Main: Unnecessary Fulfillment Locations Visible in Shopify Location Config",
              "  Feature to Staging: Bulk order and invoice improvements",
              "",
              `Current PR source branch: ${sourceBranch}`,
              `Current PR target branch: ${targetBranch}`
            ].join("\n");

            const descriptionGuidance = [
              "PR description must include a valid Central Backlog issue reference.",
              "",
              "Accepted examples:",
              "  Eshopbox-Enginnering/Central-Backlog#2516",
              "  https://github.com/Eshopbox-Enginnering/Central-Backlog/issues/2516"
            ].join("\n");

            const titleErrors = [];
            const descriptionErrors = [];

            let issueNumber = null;

            const titleMatch = title.match(titleRegex);

            if (!titleMatch) {
              titleErrors.push(titleGuidance);
            } else {
              const titleSource = normalizeType(titleMatch[1]);
              const titleTarget = String(titleMatch[2] || "").toLowerCase();
              const titleSummary = String(titleMatch[3] || "").trim();

              const actualTarget = String(targetBranch || "").toLowerCase();
              const actualSourceType = getBranchType(sourceBranch);

              if (!titleSummary) {
                titleErrors.push("PR title summary cannot be empty.");
              }

              if (actualTarget && titleTarget !== actualTarget) {
                titleErrors.push([
                  "PR title target branch does not match actual target branch.",
                  "",
                  `Title target: ${titleTarget}`,
                  `Actual target branch: ${actualTarget}`,
                  "",
                  `Expected title like: ${titleMatch[1]} to ${actualTarget}: ${titleSummary || "<summary>"}`
                ].join("\n"));
              }

              if (actualSourceType && titleSource !== actualSourceType) {
                titleErrors.push([
                  "PR title source type does not match actual source branch.",
                  "",
                  `Title source: ${titleSource}`,
                  `Actual source branch: ${sourceBranch}`,
                  `Detected source type from branch: ${actualSourceType}`,
                  "",
                  `Expected title like: ${actualSourceType} to ${actualTarget || "<target>"}: ${titleSummary || "<summary>"}`
                ].join("\n"));
              }
            }

            if (body.length === 0) {
              descriptionErrors.push(descriptionGuidance);
            } else {
              const shortMatch = body.match(shortRefRegex);
              const urlMatch = body.match(urlRefRegex);

              if (!shortMatch && !urlMatch) {
                descriptionErrors.push(descriptionGuidance);
              } else {
                issueNumber = Number((shortMatch && shortMatch[1]) || (urlMatch && urlMatch[1]));

                if (!issueNumber || Number.isNaN(issueNumber)) {
                  descriptionErrors.push(descriptionGuidance);
                }
              }
            }

            const hasBlockingErrors = titleErrors.length > 0 || descriptionErrors.length > 0;
            const summaryLines = [];

            if (!hasBlockingErrors) {
              summaryLines.push("PR title and description validation passed.");
              summaryLines.push(`Source branch: ${sourceBranch}`);
              summaryLines.push(`Target branch: ${targetBranch}`);

              if (issueNumber) {
                summaryLines.push(`Linked issue: Eshopbox-Enginnering/Central-Backlog#${issueNumber}`);
              }
            } else {
              summaryLines.push("PR validation failed.");

              if (titleErrors.length > 0) {
                summaryLines.push("");
                summaryLines.push("Title issues:");
                summaryLines.push(...titleErrors);
              }

              if (descriptionErrors.length > 0) {
                summaryLines.push("");
                summaryLines.push("Description issues:");
                summaryLines.push(...descriptionErrors);
              }
            }

            core.setOutput("summary", summaryLines.join("\n\n"));
            core.setOutput("warnings_present", "false");
            core.setOutput("blocking_errors_present", hasBlockingErrors ? "true" : "false");
            core.setOutput("pr_author", pr.user.login);

            if (hasBlockingErrors) {
              core.setFailed(summaryLines.join("\n\n"));
              return;
            }

            core.info(summaryLines.join("\n\n"));

      - name: Add or update PR comment with validation result
        if: always()
        uses: actions/github-script@v7
        env:
          VALIDATION_SUMMARY: ${{ steps.validate.outputs.summary }}
          BLOCKING_ERRORS_PRESENT: ${{ steps.validate.outputs.blocking_errors_present }}
          WARNINGS_PRESENT: ${{ steps.validate.outputs.warnings_present }}
          PR_AUTHOR: ${{ steps.validate.outputs.pr_author }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const summary = process.env.VALIDATION_SUMMARY || "Validation completed.";
            const hasBlocking = process.env.BLOCKING_ERRORS_PRESENT === "true";
            const hasWarnings = process.env.WARNINGS_PRESENT === "true";
            const prAuthor = process.env.PR_AUTHOR || pr.user.login;

            const marker = "<!-- pr-title-ticket-validation-comment -->";

            let header = "## PR validation result";
            if (hasBlocking) {
              header = "## PR validation failed";
            } else if (hasWarnings) {
              header = "## PR validation passed with warnings";
            } else {
              header = "## PR validation passed";
            }

            const mentionLine = hasBlocking
              ? `@${prAuthor} please update this PR based on the validation details below.`
              : hasWarnings
              ? `@${prAuthor} PR validation passed, but please review the warning(s) below.`
              : `@${prAuthor} PR validation passed successfully.`;

            const commentBody = [
              marker,
              header,
              "",
              mentionLine,
              "",
              "```text",
              summary,
              "```"
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100
            });

            const existing = comments.find(comment =>
              comment.user.type === "Bot" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: commentBody
              });
            }
