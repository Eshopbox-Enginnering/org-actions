name: Validate PR Title and Ticket

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches:
      - "staging"
      - "main"

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  validate-pr-title-and-ticket:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate PR title and Central Backlog ticket
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = (pr.title || "").trim();
            const body = (pr.body || "").trim();

            const titleRegex = /^(feature|features|bug|bugs|patch|patches|conflict|conflicts)\s+to\s+(staging|main):\s+.+$/i;
            const closingRegex = /\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\b/i;

            const shortRefRegex = /Eshopbox-Enginnering\/Central-Backlog#(\d+)/i;
            const urlRefRegex = /https:\/\/github\.com\/Eshopbox-Enginnering\/Central-Backlog\/issues\/(\d+)/i;

            const titleError = [
              "Invalid PR title format.",
              "",
              "Use format:",
              "  <type> to Staging: <summary>",
              "  <type> to Main: <summary>",
              "",
              "Allowed types:",
              "  Feature, Features, Bug, Bugs, Patch, Patches, Conflict, Conflicts",
              "",
              "Examples:",
              "  Feature to Staging: Order detail bugfix",
              "  Features to Main: Bulk order and invoice improvements",
              "  Bug to Staging: Fix payment sync issue",
              "  Bugs to Main: Resolve pickup and manifest issues",
              "  Patch to Staging: Update order API handling",
              "  Conflicts to Main: Resolve staging merge conflicts"
            ].join("\n");

            const ticketError = [
              "PR description must include a valid Central Backlog issue reference.",
              "",
              "Accepted examples:",
              "  Eshopbox-Enginnering/Central-Backlog#2516",
              "  https://github.com/Eshopbox-Enginnering/Central-Backlog/issues/2516"
            ].join("\n");

            const closingKeywordError = [
              "Do not use Closes, Fixes, or Resolves in PR description.",
              "",
              "Use only a backlog reference like:",
              "  Eshopbox-Enginnering/Central-Backlog#2516",
              "  https://github.com/Eshopbox-Enginnering/Central-Backlog/issues/2516"
            ].join("\n");

            if (!titleRegex.test(title)) {
              core.setFailed(titleError);
              return;
            }

            if (closingRegex.test(body)) {
              core.setFailed(closingKeywordError);
              return;
            }

            const shortMatch = body.match(shortRefRegex);
            const urlMatch = body.match(urlRefRegex);

            if (!shortMatch && !urlMatch) {
              core.setFailed(ticketError);
              return;
            }

            const issueNumber = Number((shortMatch && shortMatch[1]) || (urlMatch && urlMatch[1]));

            if (!issueNumber || Number.isNaN(issueNumber)) {
              core.setFailed(ticketError);
              return;
            }

            try {
              await github.rest.issues.get({
                owner: "Eshopbox-Enginnering",
                repo: "Central-Backlog",
                issue_number: issueNumber
              });
            } catch (error) {
              core.setFailed([
                `Central Backlog issue not found: #${issueNumber}`,
                "",
                "Use a valid issue reference in PR description, for example:",
                `  Eshopbox-Enginnering/Central-Backlog#${issueNumber}`,
                `  https://github.com/Eshopbox-Enginnering/Central-Backlog/issues/${issueNumber}`
              ].join("\n"));
              return;
            }

            core.info(`PR title is valid and Central Backlog issue #${issueNumber} exists.`);
